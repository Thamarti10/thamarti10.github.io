<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:#060e1a;color:#f1f5f9;font-family:'Courier New',monospace;min-height:100vh}
  button,label{cursor:pointer;font-family:'Courier New',monospace}
  input{font-family:'Courier New',monospace}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:#0a1624}
  ::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}
  .dot{width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;
       font-size:9px;font-weight:800;color:#fff;flex-shrink:0;cursor:pointer;position:relative;touch-action:manipulation}
  .dot-tip{position:fixed;background:#0f172a;border:1px solid #334155;border-radius:8px;
           padding:6px 10px;font-size:11px;color:#f1f5f9;white-space:nowrap;z-index:9999;
           pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,0.6);line-height:1.5;
           transform:translateX(-50%);transition:opacity 0.15s}
  .dot-V{background:#16a34a} .dot-E{background:#d97706} .dot-D{background:#dc2626}
  .dot-home{border:2px solid rgba(255,255,255,0.45)} .dot-away{border:2px solid transparent}
  .team-row{padding:10px 14px;cursor:pointer;border-bottom:1px solid #0a1421;
             display:flex;align-items:center;justify-content:space-between;transition:background 0.12s}
  .team-row:hover{background:#0a1e2e}
  .team-row.active{background:#0e2d4d}
  .tab-btn{border-radius:7px;padding:6px 14px;font-size:11px;font-weight:700;border-width:1px;border-style:solid}
  .tab-btn.active{background:#1e4d7b;border-color:#2563eb;color:#bfdbfe}
  .tab-btn.inactive{background:transparent;border-color:#1e3a5f;color:#4a7aa7}
  .stat-row{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid #1e293b}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:999;
                  display:flex;align-items:center;justify-content:center;padding:16px}
  .modal-box{background:#0c1827;border:1px solid #1e3a5f;border-radius:16px;padding:20px;
              max-width:560px;width:100%;max-height:85vh;overflow-y:auto;
              box-shadow:0 24px 60px rgba(0,0,0,0.7)}
  @media(max-width:640px){
    .hide-mobile{display:none!important}
    .header-btns{gap:4px}
    .header-btn-text{display:none}
    .grid-main{grid-template-columns:1fr!important}
    .detail-panel{margin-top:0}
  }
  @media(min-width:641px){
    .show-mobile-only{display:none!important}
  }
</style>

// ── parse helpers ─────────────────────────────────────────────────────────────
const parseGol = s => {
  if (s === null || s === undefined) return null;
  const str = String(s).trim();
  if (str.includes('+')) return 5;
  const n = parseInt(str);
  return isNaN(n) ? null : n;
};

function toTimestamp(dateRaw, timeRaw) {
  if (dateRaw != null) {
    let dateMs = null;
    if (typeof dateRaw === 'number') {
      const serial = dateRaw > 60 ? dateRaw - 1 : dateRaw;
      dateMs = (serial - 25569) * 86400000;
    } else {
      const d = new Date(String(dateRaw));
      if (!isNaN(d)) dateMs = d.getTime();
    }
    if (dateMs !== null) {
      let timeMs = 0;
      if (timeRaw != null) {
        if (typeof timeRaw === 'number' && timeRaw < 1) {
          timeMs = Math.round(timeRaw * 86400000);
        } else {
          const mm = String(timeRaw).match(/(\d{1,2}):(\d{2})/);
          if (mm) timeMs = (parseInt(mm[1]) * 60 + parseInt(mm[2])) * 60000;
        }
      }
      return dateMs + timeMs;
    }
  }
  return null;
}

function detectFormat(rows) {
  for (let i = 0; i < Math.min(5, rows.length); i++) {
    const raw = rows[i];
    if (!raw || !Array.isArray(raw)) continue;
    const row = raw.map(c => String(c ?? '').toLowerCase().trim());
    const hasMandante = row.some(c => c.includes('mand')||c.includes('casa')||c.includes('home')||c.includes('time a')||c.includes('equipe a'));
    const hasVisitante = row.some(c => c.includes('visit')||c.includes('fora')||c.includes('away')||c.includes('time b')||c.includes('equipe b'));
    if (hasMandante && hasVisitante) return { type: 'tabular', headerRow: i };
    if (row.some(c=>c.includes('rod')||c.includes('round')||c==='rd') && hasMandante) return { type: 'tabular', headerRow: i };
  }
  return { type: 'legacy' };
}

function parseTabular(rows, headerRow) {
  const header = rows[headerRow].map(c => String(c ?? '').toLowerCase().trim());
  const col = kws => header.findIndex(h => kws.some(k => h.includes(k)));
  const iRodada    = col(['rod','round','rd','jornada']);
  const iMandante  = col(['mand','casa','home','time a','equipe a']);
  const iVisitante = col(['visit','fora','away','time b','equipe b']);
  const iGolsCasa  = col(['gols casa','gols mand','gc','g. casa','g.c','golscasa','home goal','placar casa']);
  const iGolsFora  = col(['gols fora','gols visit','gf','g. fora','g.f','golsfora','away goal','placar fora']);
  const iPlacar    = col(['placar','result','score','gols']);
  const iData      = col(['data','date','dia','día']);
  const iHora      = col(['hora','hour','horario','horário','kickoff','kick-off']);
  if (iMandante === -1 || iVisitante === -1) throw new Error('Colunas mandante/visitante não encontradas.');
  const games = []; let seq = 0;
  for (let r = headerRow + 1; r < rows.length; r++) {
    const row = rows[r];
    if (!row || row.every(c => c === null || c === '')) continue;
    const casa = String(row[iMandante] ?? '').trim();
    const fora = String(row[iVisitante] ?? '').trim();
    if (!casa || !fora) continue;
    let rodada = 1;
    if (iRodada !== -1 && row[iRodada] != null) { const n = parseFloat(String(row[iRodada])); if (!isNaN(n)) rodada = Math.round(n); }
    let gc = null, gf = null;
    if (iGolsCasa !== -1 && iGolsFora !== -1) { gc = parseGol(row[iGolsCasa]); gf = parseGol(row[iGolsFora]); }
    else if (iPlacar !== -1 && row[iPlacar] != null) { const p = String(row[iPlacar]).replace(/\s/g,''); const mm = p.match(/^(\d+)[x\-a](\d+)$/i); if (mm) { gc=parseInt(mm[1]); gf=parseInt(mm[2]); } }
    if (gc === null || gf === null) continue;
    const dateRaw = iData !== -1 ? row[iData] : null;
    const timeRaw = iHora !== -1 ? row[iHora] : null;
    const dataTs = toTimestamp(dateRaw, timeRaw);
    games.push({ rodada, casa, fora, golsCasa: gc, golsFora: gf, seq: seq++, dataTs });
  }
  return games;
}

function parseLegacy(rows) {
  const headerRow = rows[0] || [];
  const headerNums = headerRow.slice(1).map(v => (v != null && !isNaN(parseFloat(v))) ? parseFloat(v) : null).filter(v => v !== null);
  const maxHeader = headerNums.length ? Math.max(...headerNums) : 0;
  const isLayoutB = maxHeader <= 23 && headerNums.length > 0;
  const games = [];

  if (isLayoutB) {
    const horaCols = [];
    for (let c = 1; c < headerRow.length; c++) {
      const v = headerRow[c];
      if (v != null && !isNaN(parseFloat(v))) horaCols.push({ colIdx: c, hora: Math.round(parseFloat(v)) });
    }
    for (let rowIdx = 1; rowIdx < rows.length; rowIdx++) {
      const row = rows[rowIdx];
      if (!row) continue;
      const minRaw = row[0];
      if (minRaw === 'H' || minRaw == null) continue;
      const minNum = parseFloat(minRaw);
      if (isNaN(minNum)) continue;
      const minuto = Math.round(minNum);
      for (const { colIdx, hora } of horaCols) {
        const cell = row[colIdx];
        if (!cell || typeof cell !== 'string') continue;
        const parts = cell.trim().split('\n');
        if (parts.length < 2) continue;
        const times = parts[0].trim().split(' x ');
        if (times.length !== 2) continue;
        const score = parts[1].trim().split('x');
        if (score.length !== 2) continue;
        const gc = parseGol(score[0]); const gf = parseGol(score[1]);
        if (gc === null || gf === null) continue;
        const timeKey = hora * 100 + minuto;
        games.push({ rodada: rowIdx, hora, minuto, casa: times[0].trim(), fora: times[1].trim(), golsCasa: gc, golsFora: gf, seq: -timeKey, dataTs: null });
      }
    }
  } else {
    const minuteCols = [];
    for (let c = 1; c < headerRow.length; c++) {
      const v = headerRow[c];
      if (v !== null && v !== undefined && !isNaN(parseFloat(v))) minuteCols.push({ colIdx: c, minuto: parseInt(parseFloat(v)) });
    }
    let seq = 0;
    for (let rowIdx = 1; rowIdx < rows.length; rowIdx++) {
      const row = rows[rowIdx];
      if (!row) continue;
      const horaRaw = row[0];
      if (horaRaw === 'H' || horaRaw == null) continue;
      const horaNum = parseFloat(horaRaw);
      if (isNaN(horaNum)) continue;
      const hora = Math.round(horaNum);
      for (const { colIdx, minuto } of minuteCols) {
        const cell = row[colIdx];
        if (!cell || typeof cell !== 'string') continue;
        const parts = cell.trim().split('\n');
        if (parts.length < 2) continue;
        const times = parts[0].trim().split(' x ');
        if (times.length !== 2) continue;
        const score = parts[1].trim().split('x');
        if (score.length !== 2) continue;
        const gc = parseGol(score[0]); const gf = parseGol(score[1]);
        if (gc === null || gf === null) continue;
        const maxCols = minuteCols.length + 2;
        games.push({ rodada: rowIdx, hora, minuto, casa: times[0].trim(), fora: times[1].trim(), golsCasa: gc, golsFora: gf, seq: rowIdx * 1000 + (maxCols - colIdx), dataTs: null });
      }
    }
  }
  return games;
}

function parseXlsx(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
        const { type, headerRow } = detectFormat(rows);
        let games;
        if (type === 'tabular') games = parseTabular(rows, headerRow);
        else games = parseLegacy(rows);
        if (games.length === 0) reject(new Error('Nenhum jogo encontrado. Verifique o formato da planilha.'));
        else resolve({ games, format: type });
      } catch (err) { reject(err); }
    };
    reader.onerror = () => reject(new Error('Erro ao ler o arquivo.'));
    reader.readAsArrayBuffer(file);
  });
}

function getResult(g, adv) { return g > adv ? 'V' : g < adv ? 'D' : 'E'; }

function maxStreak(arr, fn) {
  let max = 0, cur = 0, best = [], cur2 = [];
  arr.forEach(item => {
    if (fn(item)) { cur++; cur2.push(item); if (cur > max) { max = cur; best = [...cur2]; } }
    else { cur = 0; cur2 = []; }
  });
  return { count: max, games: best };
}

function currentStreak(games) {
  // games já estão em ordem cronológica (mais recente primeiro)
  if (!games || games.length === 0) return { type: null, count: 0 };
  const first = games[0];
  let type, fn;
  // detecta o tipo da sequência atual
  if (first.result === 'V')      { type = 'V'; fn = g => g.result === 'V'; }
  else if (first.result === 'D') { type = 'D'; fn = g => g.result === 'D'; }
  else                           { type = 'E'; fn = g => g.result === 'E'; }
  let count = 0;
  for (const g of games) { if (fn(g)) count++; else break; }
  // sequências especiais
  let unbeaten = 0, noWin = 0, bttsY = 0, bttsN = 0;
  for (const g of games) { if (g.result !== 'D') unbeaten++; else break; }
  for (const g of games) { if (g.result !== 'V') noWin++;    else break; }
  for (const g of games) { if (g.gols > 0 && g.golsAdv > 0) bttsY++; else break; }
  for (const g of games) { if (g.gols === 0 || g.golsAdv === 0) bttsN++; else break; }
  return { type, count, unbeaten, noWin, bttsY, bttsN };
}

function analyzeTeam(name, schedule) {
  const games = schedule
    .filter(g => g.casa === name || g.fora === name)
    .sort((a, b) => {
      if (a.dataTs != null && b.dataTs != null) return b.dataTs - a.dataTs;
      if (a.dataTs != null) return -1;
      if (b.dataTs != null) return 1;
      return (a.seq ?? 0) - (b.seq ?? 0);
    })
    .map(g => {
      const isHome = g.casa === name;
      const gols = isHome ? g.golsCasa : g.golsFora;
      const golsAdv = isHome ? g.golsFora : g.golsCasa;
      return { rodada: g.rodada, hora: g.hora, minuto: g.minuto, seq: g.seq, isHome, gols, golsAdv, result: getResult(gols, golsAdv) };
    });
  const home = games.filter(g => g.isHome);
  const away = games.filter(g => !g.isHome);
  const pts = games.reduce((s,g) => s+(g.result==='V'?3:g.result==='E'?1:0),0);
  const gf  = games.reduce((s,g) => s+g.gols,0);
  const gc  = games.reduce((s,g) => s+g.golsAdv,0);
  return {
    name, games, pts, gf, gc, gd: gf-gc,
    w: games.filter(g=>g.result==='V').length,
    d: games.filter(g=>g.result==='E').length,
    l: games.filter(g=>g.result==='D').length,
    maxWin:      maxStreak(games, g=>g.result==='V'),
    maxLoss:     maxStreak(games, g=>g.result==='D'),
    maxDraw:     maxStreak(games, g=>g.result==='E'),
    maxUnbeaten: maxStreak(games, g=>g.result!=='D'),
    maxNoWin:    maxStreak(games, g=>g.result!=='V'),
    maxHomeCons: maxStreak(games, g=>g.isHome),
    maxAwayCons: maxStreak(games, g=>!g.isHome),
    maxHomeWin:  maxStreak(home, g=>g.result==='V'),
    maxHomeLoss: maxStreak(home, g=>g.result==='D'),
    maxHomeDraw: maxStreak(home, g=>g.result==='E'),
    maxHomeUnb:  maxStreak(home, g=>g.result!=='D'),
    maxHomeNoW:  maxStreak(home, g=>g.result!=='V'),
    maxAwayWin:  maxStreak(away, g=>g.result==='V'),
    maxAwayLoss: maxStreak(away, g=>g.result==='D'),
    maxAwayDraw: maxStreak(away, g=>g.result==='E'),
    maxAwayUnb:  maxStreak(away, g=>g.result!=='D'),
    maxAwayNoW:  maxStreak(away, g=>g.result!=='V'),
    maxBttsYes:  maxStreak(games, g=>g.gols>0 && g.golsAdv>0),
    maxBttsNo:   maxStreak(games, g=>g.gols===0 || g.golsAdv===0),
    maxHomeBttsY:maxStreak(home,  g=>g.gols>0 && g.golsAdv>0),
    maxHomeBttsN:maxStreak(home,  g=>g.gols===0 || g.golsAdv===0),
    maxAwayBttsY:maxStreak(away,  g=>g.gols>0 && g.golsAdv>0),
    maxAwayBttsN:maxStreak(away,  g=>g.gols===0 || g.golsAdv===0),
    maxOver25:   maxStreak(games, g=>(g.gols+g.golsAdv)>2),
    maxOver35:   maxStreak(games, g=>(g.gols+g.golsAdv)>3),
    maxUnder25:  maxStreak(games, g=>(g.gols+g.golsAdv)<3),
    maxHomeOver25: maxStreak(home, g=>(g.gols+g.golsAdv)>2),
    maxHomeOver35: maxStreak(home, g=>(g.gols+g.golsAdv)>3),
    maxHomeUnder25:maxStreak(home, g=>(g.gols+g.golsAdv)<3),
    maxAwayOver25: maxStreak(away, g=>(g.gols+g.golsAdv)>2),
    maxAwayOver35: maxStreak(away, g=>(g.gols+g.golsAdv)>3),
    maxAwayUnder25:maxStreak(away, g=>(g.gols+g.golsAdv)<3),
    current: currentStreak(games),
  };
}

// retorna lista de alertas: { team, market, current, record, gap, breaking }
function calcAlerts(teams) {
  const alerts = [];
  for (const t of teams) {
    for (const m of ALERT_MARKETS) {
      const record = t[m.key]?.count ?? 0;
      if (record === 0) continue;
      // pega a sequência ATUAL desse mercado específico
      const curSeq = calcCurrentForMarket(t, m.key);
      const gap = record - curSeq;
      if (gap === 0) {
        // já está igualando o recorde
        alerts.push({ team: t, market: m, current: curSeq, record, gap: 0, breaking: true });
      } else if (gap <= ALERT_THRESHOLD) {
        alerts.push({ team: t, market: m, current: curSeq, record, gap, breaking: false });
      }
    }
  }
  // ordena: igualando primeiro, depois por menor gap, depois por maior sequência atual
  alerts.sort((a,b) => a.gap - b.gap || b.current - a.current);
  return alerts;
}

function calcCurrentForMarket(t, key) {
  const games = t.games; // já em ordem cronológica mais recente primeiro
  const fn = marketFn(key, t);
  let count = 0;
  for (const g of games) {
    if (fn(g)) count++; else break;
  }
  return count;
}

function marketFn(key, t) {
  switch(key) {
    case 'maxWin':       return g => g.result === 'V';
    case 'maxUnbeaten':  return g => g.result !== 'D';
    case 'maxLoss':      return g => g.result === 'D';
    case 'maxNoWin':     return g => g.result !== 'V';
    case 'maxDraw':      return g => g.result === 'E';
    case 'maxHomeWin':   return g => g.isHome && g.result === 'V';
    case 'maxHomeLoss':  return g => g.isHome && g.result === 'D';
    case 'maxHomeUnb':   return g => g.isHome && g.result !== 'D';
    case 'maxHomeNoW':   return g => g.isHome && g.result !== 'V';
    case 'maxAwayWin':   return g => !g.isHome && g.result === 'V';
    case 'maxAwayLoss':  return g => !g.isHome && g.result === 'D';
    case 'maxAwayUnb':   return g => !g.isHome && g.result !== 'D';
    case 'maxAwayNoW':   return g => !g.isHome && g.result !== 'V';
    case 'maxBttsYes':   return g => g.gols > 0 && g.golsAdv > 0;
    case 'maxBttsNo':    return g => g.gols === 0 || g.golsAdv === 0;
    case 'maxHomeBttsY': return g => g.isHome && g.gols > 0 && g.golsAdv > 0;
    case 'maxHomeBttsN': return g => g.isHome && (g.gols === 0 || g.golsAdv === 0);
    case 'maxAwayBttsY': return g => !g.isHome && g.gols > 0 && g.golsAdv > 0;
    case 'maxAwayBttsN': return g => !g.isHome && (g.gols === 0 || g.golsAdv === 0);
    default: return () => false;
  }
}

function calcGlobalBtts(schedule) {
  // Ordena todos os jogos cronologicamente (mais recente primeiro = seq ASC)
  const sorted = [...schedule].sort((a,b) => {
    if (a.dataTs != null && b.dataTs != null) return b.dataTs - a.dataTs;
    if (a.dataTs != null) return -1;
    if (b.dataTs != null) return 1;
    return (a.seq ?? 0) - (b.seq ?? 0);
  });

  // inverte para ordem cronológica crescente (mais antigo primeiro) para calcular sequências
  const asc = [...sorted].reverse();

  function bestStreak(fn) {
    let max = 0, cur = 0, bestGames = [], curGames = [];
    for (const g of asc) {
      if (fn(g)) {
        cur++; curGames.push(g);
        if (cur > max) { max = cur; bestGames = [...curGames]; }
      } else { cur = 0; curGames = []; }
    }
    // sequência atual (no final da lista = jogos mais recentes)
    let curStreak = 0;
    for (let i = asc.length - 1; i >= 0; i--) {
      if (fn(asc[i])) curStreak++; else break;
    }
    return { count: max, games: bestGames, current: curStreak };
  }

  return {
    bttsYes: bestStreak(g => g.golsCasa > 0 && g.golsFora > 0),
    bttsNo:  bestStreak(g => g.golsCasa === 0 || g.golsFora === 0),
  };
}

    { key:'maxUnbeaten',  label:'🛡️ Invicto' },
    { key:'maxLoss',      label:'💔 Derrotas consecutivas' },
    { key:'maxNoWin',     label:'⚠️ Sem vencer' },
    { key:'maxDraw',      label:'🤝 Empates consecutivos' },
    { key:'maxHomeWin',   label:'🏠✅ Vitórias em casa' },
    { key:'maxHomeLoss',  label:'🏠❌ Derrotas em casa' },
    { key:'maxHomeUnb',   label:'🏠🛡️ Invicto em casa' },
    { key:'maxAwayWin',   label:'✈️✅ Vitórias fora' },
    { key:'maxAwayLoss',  label:'✈️❌ Derrotas fora' },
    { key:'maxAwayUnb',   label:'✈️🛡️ Invicto fora' },
    { key:'maxBttsYes',    label:'⚽⚽ Ambas marcam' },
    { key:'maxBttsNo',     label:'🚫⚽ Ambas NÃO marcam' },
    { key:'maxOver25',     label:'🔺 Over 2.5' },
    { key:'maxOver35',     label:'🔺🔺 Over 3.5' },
    { key:'maxUnder25',    label:'🔻 Under 2.5' },
  ];

  const metricRows = (!tA || !tB) ? '' : metrics.map(m => {
    const vA = tA[m.key]?.count ?? 0;
    const vB = tB[m.key]?.count ?? 0;
    const max = Math.max(vA, vB, 1);
    const winA = vA > vB, winB = vB > vA;
    const barA = Math.round((vA/max)*100);
    const barB = Math.round((vB/max)*100);
    return `
      <div style="padding:10px 0;border-bottom:1px solid #0a1421">
        <div style="font-size:11px;color:#64748b;text-align:center;margin-bottom:6px">${m.label}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <!-- team A bar (right-aligned) -->
          <div style="flex:1;display:flex;align-items:center;gap:6px;justify-content:flex-end">
            <span style="font-size:16px;font-weight:900;color:${winA?'#4ade80':'#94a3b8'}">${vA}</span>
            <div style="width:80px;height:8px;background:#0a1421;border-radius:4px;overflow:hidden">
              <div style="width:${barA}%;height:100%;background:${winA?'#16a34a':'#334155'};border-radius:4px;margin-left:auto"></div>
            </div>
          </div>
          <div style="width:2px;height:20px;background:#1e3a5f;flex-shrink:0"></div>
          <!-- team B bar (left-aligned) -->
          <div style="flex:1;display:flex;align-items:center;gap:6px">
            <div style="width:80px;height:8px;background:#0a1421;border-radius:4px;overflow:hidden">
              <div style="width:${barB}%;height:100%;background:${winB?'#16a34a':'#334155'};border-radius:4px"></div>
            </div>
            <span style="font-size:16px;font-weight:900;color:${winB?'#4ade80':'#94a3b8'}">${vB}</span>
          </div>
        </div>
      </div>`;
  }).join('');

  // current streak comparison
  const curRow = (!tA || !tB) ? '' : (() => {
    const curA = tA.current, curB = tB.current;
    const colA = curA.type==='V'?'#16a34a':curA.type==='D'?'#dc2626':'#d97706';
    const colB = curB.type==='V'?'#16a34a':curB.type==='D'?'#dc2626':'#d97706';
    return `
      <div style="background:#091420;border:1px solid #1e3a5f;border-radius:10px;padding:14px;margin-bottom:14px">
        <div style="font-size:10px;color:#475569;letter-spacing:1.5px;text-transform:uppercase;text-align:center;margin-bottom:10px">
          ⚡ Sequência Atual
        </div>
        <div style="display:flex;justify-content:space-around;align-items:center">
          <div style="text-align:center">
            <div style="font-size:11px;color:#64748b;margin-bottom:4px">${tA.name}</div>
            <span style="background:${colA};color:#fff;border-radius:8px;padding:6px 16px;font-size:22px;font-weight:900">${curA.count}${curA.type}</span>
          </div>
          <div style="font-size:20px;color:#1e3a5f">⚔️</div>
          <div style="text-align:center">
            <div style="font-size:11px;color:#64748b;margin-bottom:4px">${tB.name}</div>
            <span style="background:${colB};color:#fff;border-radius:8px;padding:6px 16px;font-size:22px;font-weight:900">${curB.count}${curB.type}</span>
          </div>
        </div>
      </div>`;
  })();

  // recent 5 games side by side
  const recentRow = (!tA || !tB) ? '' : `
    <div style="background:#091420;border:1px solid #1e3a5f;border-radius:10px;padding:14px;margin-bottom:14px">
      <div style="font-size:10px;color:#475569;letter-spacing:1.5px;text-transform:uppercase;text-align:center;margin-bottom:10px">
        🕐 Últimos 5 jogos
      </div>
      <div style="display:flex;justify-content:space-around;align-items:center;gap:12px">
        <div style="display:flex;gap:3px">${tA.games.slice(0,5).map(g=>dot(g)).join('')}</div>
        <div style="color:#1e3a5f;font-size:16px">vs</div>
        <div style="display:flex;gap:3px">${tB.games.slice(0,5).map(g=>dot(g)).join('')}</div>
      </div>
    </div>`;

  // ── H2H ─────────────────────────────────────────────────────────────────────
  const h2hGames = (!tA || !tB) ? [] : state.schedule
    .filter(g =>
      (g.casa === tA.name && g.fora === tB.name) ||
      (g.casa === tB.name && g.fora === tA.name)
    )
    .sort((a,b) => {
      if (a.dataTs != null && b.dataTs != null) return b.dataTs - a.dataTs;
      if (a.dataTs != null) return -1;
      if (b.dataTs != null) return 1;
      return (a.seq ?? 0) - (b.seq ?? 0);
    });

  const h2hStats = (() => {
    if (!tA || !tB || h2hGames.length === 0) return null;
    let wA=0, wB=0, draws=0, gfA=0, gfB=0;
    for (const g of h2hGames) {
      const goalsA = g.casa === tA.name ? g.golsCasa : g.golsFora;
      const goalsB = g.casa === tB.name ? g.golsCasa : g.golsFora;
      gfA += goalsA; gfB += goalsB;
      if (goalsA > goalsB) wA++;
      else if (goalsB > goalsA) wB++;
      else draws++;
    }
    return { wA, wB, draws, gfA, gfB, total: h2hGames.length };
  })();

  const h2hBlock = (!tA || !tB) ? '' : h2hGames.length === 0
    ? `<div style="background:#0a1624;border:1px solid #1e293b;border-radius:12px;
                   padding:20px;text-align:center;color:#334155;font-size:12px;margin-bottom:14px">
         ⚔️ Nenhum confronto direto encontrado na planilha
       </div>`
    : `<div style="background:#0a1624;border:1px solid #1e293b;border-radius:12px;
                   overflow:hidden;margin-bottom:14px">

        <!-- header -->
        <div style="padding:10px 14px;background:#111f30;display:flex;align-items:center;
                    gap:8px;border-bottom:1px solid #1e293b">
          <span style="font-size:15px">⚔️</span>
          <span style="font-size:12px;font-weight:800;color:#f0f9ff">Confrontos Diretos</span>
          <span style="margin-left:auto;background:#1e3a5f;color:#7dd3fc;border-radius:5px;
                       padding:1px 8px;font-size:11px;font-weight:700">${h2hGames.length} jogos</span>
        </div>

        <!-- placar geral -->
        <div style="padding:14px;border-bottom:1px solid #0a1421">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">

            <!-- Time A -->
            <div style="flex:1;text-align:center">
              <div style="font-size:11px;color:#64748b;margin-bottom:4px;white-space:nowrap;
                          overflow:hidden;text-overflow:ellipsis">${tA.name}</div>
              <div style="font-size:32px;font-weight:900;
                color:${h2hStats.wA>h2hStats.wB?'#4ade80':h2hStats.wA<h2hStats.wB?'#f87171':'#f59e0b'}">
                ${h2hStats.wA}
              </div>
              <div style="font-size:10px;color:#475569">${h2hStats.gfA} gols</div>
            </div>

            <!-- centro -->
            <div style="text-align:center;flex-shrink:0">
              <div style="font-size:24px;font-weight:900;color:#d97706">${h2hStats.draws}</div>
              <div style="font-size:10px;color:#475569">empates</div>
            </div>

            <!-- Time B -->
            <div style="flex:1;text-align:center">
              <div style="font-size:11px;color:#64748b;margin-bottom:4px;white-space:nowrap;
                          overflow:hidden;text-overflow:ellipsis">${tB.name}</div>
              <div style="font-size:32px;font-weight:900;
                color:${h2hStats.wB>h2hStats.wA?'#4ade80':h2hStats.wB<h2hStats.wA?'#f87171':'#f59e0b'}">
                ${h2hStats.wB}
              </div>
              <div style="font-size:10px;color:#475569">${h2hStats.gfB} gols</div>
            </div>
          </div>

          <!-- barra de domínio -->
          ${(() => {
            const tot = h2hStats.wA + h2hStats.wB + h2hStats.draws || 1;
            const pA = Math.round((h2hStats.wA/tot)*100);
            const pD = Math.round((h2hStats.draws/tot)*100);
            const pB = 100 - pA - pD;
            return `<div style="display:flex;height:6px;border-radius:3px;overflow:hidden;margin-top:12px;gap:1px">
              <div style="width:${pA}%;background:#16a34a;border-radius:3px 0 0 3px"></div>
              <div style="width:${pD}%;background:#d97706"></div>
              <div style="width:${pB}%;background:#dc2626;border-radius:0 3px 3px 0"></div>
            </div>`;
          })()}
        </div>

        <!-- lista de jogos -->
        <div style="max-height:320px;overflow-y:auto;-webkit-overflow-scrolling:touch">
          ${h2hGames.map((g,i) => {
            const hora = g.hora != null
              ? String(g.hora).padStart(2,'0')+':'+String(g.minuto??0).padStart(2,'0')
              : 'R'+g.rodada;
            const goalsA = g.casa === tA.name ? g.golsCasa : g.golsFora;
            const goalsB = g.casa === tB.name ? g.golsCasa : g.golsFora;
            const winner = goalsA > goalsB ? 'A' : goalsB > goalsA ? 'B' : 'D';
            const colA = winner==='A'?'#16a34a':winner==='D'?'#d97706':'#475569';
            const colB = winner==='B'?'#16a34a':winner==='D'?'#d97706':'#475569';
            const isCasaA = g.casa === tA.name;
            return `
            <div style="padding:8px 14px;border-bottom:1px solid #0a1421;
                        background:${i%2===0?'transparent':'#070f1b'};
                        display:flex;align-items:center;gap:8px">
              <span style="font-size:10px;color:#4a7aa7;flex-shrink:0;min-width:34px;font-weight:700">${hora}</span>
              <span style="flex:1;font-size:11px;font-weight:700;color:${colA};
                           text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                ${tA.name} ${isCasaA?'🏠':'✈️'}
              </span>
              <span style="background:#1e293b;color:#e2e8f0;border-radius:5px;padding:2px 8px;
                           font-weight:900;font-size:13px;flex-shrink:0;letter-spacing:1px">
                ${goalsA}–${goalsB}
              </span>
              <span style="flex:1;font-size:11px;font-weight:700;color:${colB};
                           white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                ${!isCasaA?'🏠':'✈️'} ${tB.name}
              </span>
            </div>`;
          }).join('')}
        </div>
      </div>`;

  return `
    <div style="display:flex;gap:10px;margin-bottom:16px">
      ${selector('Time A', state.compareA, 'compareA')}
      <div style="display:flex;align-items:flex-end;padding-bottom:8px;color:#1e3a5f;font-size:20px">⚔️</div>
      ${selector('Time B', state.compareB, 'compareB')}
    </div>

    ${!tA || !tB ? `
      <div style="background:#0a1624;border:1px dashed #1e293b;border-radius:12px;padding:40px;
                  text-align:center;color:#1e3a5f;font-size:13px">
        Selecione dois times para comparar
      </div>` : `
      ${curRow}
      ${recentRow}
      ${h2hBlock}
      <div style="background:#0a1624;border:1px solid #1e293b;border-radius:12px;overflow:hidden">
        <div style="padding:10px 14px;background:#111f30;display:flex;justify-content:space-between;
                    font-size:11px;font-weight:800;color:#f0f9ff;border-bottom:1px solid #1e293b">
          <span style="flex:1;text-align:right">${tA.name}</span>
          <span style="width:20px"></span>
          <span style="flex:1">${tB.name}</span>
        </div>
        ${metricRows}
      </div>`}
  `;
}

function renderRankings(teams) {
  if (!teams || teams.length === 0) return '<div style="padding:40px;text-align:center;color:#334155">Importe uma planilha para ver os rankings.</div>';

  const categories = [
    { key:'maxWin',      icon:'🏆', label:'Vitórias consecutivas',         color:'#16a34a' },
    { key:'maxUnbeaten', icon:'🛡️', label:'Jogos invicto',                 color:'#2563eb' },
    { key:'maxLoss',     icon:'💔', label:'Derrotas consecutivas',         color:'#dc2626' },
    { key:'maxNoWin',    icon:'⚠️', label:'Jogos sem vencer',              color:'#d97706' },
    { key:'maxDraw',     icon:'🤝', label:'Empates consecutivos',          color:'#8b5cf6' },
    { key:'maxHomeWin',  icon:'🏠🏆',label:'Vitórias seguidas em casa',    color:'#16a34a' },
    { key:'maxHomeLoss', icon:'🏠💔',label:'Derrotas seguidas em casa',    color:'#dc2626' },
    { key:'maxHomeUnb',  icon:'🏠🛡️',label:'Invicto em casa',             color:'#2563eb' },
    { key:'maxHomeNoW',  icon:'🏠⚠️',label:'Sem vencer em casa',          color:'#d97706' },
    { key:'maxAwayWin',  icon:'✈️🏆',label:'Vitórias seguidas fora',         color:'#16a34a' },
    { key:'maxAwayLoss', icon:'✈️💔',label:'Derrotas seguidas fora',         color:'#dc2626' },
    { key:'maxAwayUnb',  icon:'✈️🛡️',label:'Invicto fora',                  color:'#2563eb' },
    { key:'maxAwayNoW',  icon:'✈️⚠️',label:'Sem vencer fora',               color:'#d97706' },
    { key:'maxBttsYes',  icon:'⚽⚽', label:'Ambas marcam – geral',          color:'#10b981' },
    { key:'maxBttsNo',   icon:'🚫⚽', label:'Ambas NÃO marcam – geral',     color:'#6366f1' },
    { key:'maxHomeBttsY',icon:'🏠⚽', label:'Ambas marcam – em casa',       color:'#10b981' },
    { key:'maxHomeBttsN',icon:'🏠🚫', label:'Ambas NÃO marcam – em casa',  color:'#6366f1' },
    { key:'maxAwayBttsY',icon:'✈️⚽', label:'Ambas marcam – fora',          color:'#10b981' },
    { key:'maxAwayBttsN',icon:'✈️🚫', label:'Ambas NÃO marcam – fora',     color:'#6366f1' },
  ];

  return categories.map(cat => {
    // sort all teams by this streak desc, take top 10
    const ranked = [...teams]
      .filter(t => t[cat.key] && t[cat.key].count > 0)
      .sort((a,b) => b[cat.key].count - a[cat.key].count)
      .slice(0, 10);

    if (ranked.length === 0) return '';

    const maxCount = ranked[0][cat.key].count;

    const rows = ranked.map((t, i) => {
      const streak = t[cat.key];
      const barPct = Math.round((streak.count / maxCount) * 100);
      const medals = ['🥇','🥈','🥉'];
      const medal = i < 3 ? medals[i] : `<span style="color:#475569;font-size:11px">${i+1}</span>`;
      return `
        <div style="padding:8px 14px;border-bottom:1px solid #0a1421;cursor:pointer"
             onclick="setState({selected:'${t.name.replace(/'/g,"\'")}',tab:'times',showDetail:true})">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="width:22px;text-align:center;flex-shrink:0">${medal}</span>
            <span style="font-weight:700;font-size:13px;color:#cbd5e1;flex:1">${t.name}</span>
            <span style="font-size:18px;font-weight:900;color:${cat.color};min-width:28px;text-align:right">${streak.count}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;padding-left:30px">
            <div style="flex:1;height:4px;background:#0a1421;border-radius:2px;overflow:hidden">
              <div style="width:${barPct}%;height:100%;background:${cat.color};border-radius:2px;opacity:0.7"></div>
            </div>
            <div style="display:flex;gap:2px">${dots(streak.games.slice(0,12))}</div>
          </div>
        </div>`;
    }).join('');

    return `
      <div style="background:#0a1624;border:1px solid #1e293b;border-radius:12px;overflow:hidden;margin-bottom:14px">
        <div style="padding:10px 14px;background:#111f30;display:flex;align-items:center;gap:8px;border-bottom:1px solid #1e293b">
          <span style="font-size:16px">${cat.icon}</span>
          <span style="font-size:12px;font-weight:800;color:#f0f9ff;letter-spacing:0.5px">${cat.label}</span>
          <span style="margin-left:auto;font-size:10px;color:#475569">Recorde: ${maxCount}</span>
        </div>
        ${rows}
      </div>`;
  }).join('');
}

// ── state ─────────────────────────────────────────────────────────────────────
let state = {
  schedule: DEFAULT_SCHEDULE.map((g,i) => ({...g, seq: i, dataTs: null})),
  fileName: 'Copa (padrão)',
  importing: false,
  importErr: '',
  importOk: '',
  selected: null,
  tab: 'times',
  search: '',
  showHelp: false,
  showDetail: false,
  compareA: null,
  compareB: null, // mobile: show detail panel
};

let teams = [];

function recompute() {
  const names = [...new Set(state.schedule.flatMap(g => [g.casa, g.fora]))].sort();
  teams = names.map(n => analyzeTeam(n, state.schedule)).sort((a,b) => b.pts-a.pts||b.gd-a.gd);
}
recompute();

function setState(patch) {
  Object.assign(state, patch);
  recompute();
  render();
}

// ── render helpers ────────────────────────────────────────────────────────────
// tooltip global
let tipEl = null;
function showTip(el, text) {
  hideTip();
  tipEl = document.createElement('div');
  tipEl.className = 'dot-tip';
  tipEl.textContent = text;
  document.body.appendChild(tipEl);
  const rect = el.getBoundingClientRect();
  const tw = Math.min(tipEl.offsetWidth, 200);
  let left = rect.left + rect.width / 2;
  let top  = rect.top - tipEl.offsetHeight - 8 + window.scrollY;
  // keep inside screen
  left = Math.max(tw/2 + 6, Math.min(window.innerWidth - tw/2 - 6, left));
  if (top < window.scrollY + 6) top = rect.bottom + 8 + window.scrollY;
  tipEl.style.left = left + 'px';
  tipEl.style.top  = top + 'px';
}
function hideTip() {
  if (tipEl) { tipEl.remove(); tipEl = null; }
}
document.addEventListener('click', hideTip);
document.addEventListener('scroll', hideTip, true);

function dot(g) {
  const label = g.hora != null
    ? String(g.hora).padStart(2,'0')+':'+String(g.minuto??0).padStart(2,'0')
    : 'R'+g.rodada;
  const adv = g.isHome ? '' : ' (fora)';
  const tip = `${label}  ${g.gols}–${g.golsAdv}  ${g.isHome?'🏠 Casa':'✈️ Fora'}`;
  const esc = tip.replace(/'/g, "\'");
  return `<span class="dot dot-${g.result} ${g.isHome?'dot-home':'dot-away'}"
    onmouseenter="showTip(this,'${esc}')"
    onmouseleave="hideTip()"
    ontouchstart="showTip(this,'${esc}');event.stopPropagation()"
  >${g.isHome?'C':'F'}</span>`;
}

function dots(games) {
  return games.map(dot).join(' ');
}

function statRow(icon, label, streak) {
  if (streak.count === 0) return '';
  return `
    <div class="stat-row">
      <div style="width:22px;font-size:13px;text-align:center">${icon}</div>
      <div style="flex:1;font-size:12px;color:#94a3b8">${label}</div>
      <div style="width:28px;font-weight:800;font-size:15px;color:#f1f5f9;text-align:center">${streak.count}</div>
      <div style="display:flex;gap:3px;flex-wrap:wrap;max-width:200px">${dots(streak.games)}</div>
    </div>`;
}

function section(title, rows) {
  const content = rows.join('');
  if (!content.trim()) return '';
  return `
    <div style="margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;color:#475569;text-transform:uppercase;
                  margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid #334155">${title}</div>
      ${content}
    </div>`;
}

// ── event handlers ────────────────────────────────────────────────────────────
async function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  state.importing = true;
  state.importErr = '';
  state.importOk  = '';
  render();
  try {
    const arrayBuffer = await file.arrayBuffer();
    const data = new Uint8Array(arrayBuffer);
    const wb   = XLSX.read(data, { type: 'array' });
    const ws   = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
    const { type, headerRow } = detectFormat(rows);
    const games = type === 'tabular' ? parseTabular(rows, headerRow) : parseLegacy(rows);
    if (!games || games.length === 0) throw new Error('Nenhum jogo encontrado. Verifique o formato.');
    state.schedule  = games;
    state.fileName  = file.name;
    state.selected  = null;
    state.search    = '';
    state.importing = false;
    state.importOk  = `✅ ${games.length} jogos importados! (${type === 'tabular' ? 'tabular' : 'legado'})`;
    recompute();
    render();
    setTimeout(() => { state.importOk = ''; render(); }, 5000);
  } catch (err) {
    state.importing = false;
    state.importErr = err.message || 'Erro ao importar.';
    render();
  }
}

function initGis() {
  tokenClient = google.accounts.oauth2.initTokenClient({

function openDrivePicker() {

function showPicker() {
  const view = new google.picker.DocsView()
    .setIncludeFolders(false)
    .setMimeTypes(PICKER_MIME)
    .setMode(google.picker.DocsViewMode.LIST);

  const picker = new google.picker.PickerBuilder()
    .addView(view)
    .setOAuthToken(accessToken)
    .setDeveloperKey(GAPI_KEY)
    .setTitle('Selecione sua planilha')
    .setCallback(pickerCallback)
    .build();

  picker.setVisible(true);
}

async function pickerCallback(data) {
  if (data[google.picker.Response.ACTION] !== google.picker.Action.PICKED) return;
  const file = data[google.picker.Response.DOCUMENTS][0];
  const fileId = file[google.picker.Document.ID];
  const fileName = file[google.picker.Document.NAME];

  setState({ importing: true, importErr: '', importOk: '' });
  try {
    const resp = await fetch(
      `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    if (!resp.ok) throw new Error(`Erro ao baixar arquivo: ${resp.status}`);
    const arrayBuffer = await resp.arrayBuffer();
    const data2 = new Uint8Array(arrayBuffer);
    const wb = XLSX.read(data2, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
    const { type, headerRow } = detectFormat(rows);
    let games;
    if (type === 'tabular') games = parseTabular(rows, headerRow);
    else games = parseLegacy(rows);
    if (games.length === 0) throw new Error('Nenhum jogo encontrado na planilha.');
    setState({
      schedule: games,
      fileName: fileName,
      selected: null,
      search: '',
      importing: false,
      importOk: `✅ ${games.length} jogos importados do Drive! (${type === 'tabular' ? 'tabular' : 'legado'})`,
    });
    setTimeout(() => setState({ importOk: '' }), 5000);
  } catch (err) {
    // Token expirado — pede novo
    if (err.message.includes('401') || err.message.includes('403')) {
      accessToken = null;
      setState({ importing: false, importErr: 'Sessão expirada. Clique em 📂 Drive novamente.' });
    } else {
      setState({ importing: false, importErr: err.message || 'Erro ao importar do Drive.' });
    }
  }
}

// init Google APIs
window.addEventListener('load', () => {
  if (typeof gapi !== 'undefined') gapi.load('picker', () => { gapiReady = true; });
  if (typeof google !== 'undefined' && google.accounts) initGis();
  // poll until both libs load (async CDN)
  const poll = setInterval(() => {
    if (typeof gapi !== 'undefined' && !gapiReady) gapi.load('picker', () => { gapiReady = true; });
    if (typeof google !== 'undefined' && google.accounts && !gisReady) initGis();
    if (gapiReady && gisReady) clearInterval(poll);
  }, 500);
});

window.addEventListener('resize', render);
render();
</script>
  <!-- static file input outside render loop -->
  <input type="file" id="fileInput" accept=".xlsx,.xlsm,.xls" style="display:none">
  <script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
      handleFile(e);
      // reset so same file can be re-imported
      setTimeout(() => { this.value = ''; }, 500);
    });
  </script>
</body>
